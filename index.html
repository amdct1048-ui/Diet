<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>다이어트 트래커</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;max-width:440px;margin:0 auto;padding-bottom:90px;}
input,button{font-family:inherit;}
.hide{display:none!important;}
#header{padding:22px 16px 0;display:flex;justify-content:space-between;align-items:center;}
#header h1{font-size:20px;font-weight:800;color:#2d3f52;}
#header p{font-size:12px;color:#7a93a8;margin-top:2px;}
#tabbar{display:flex;background:#e8eef4;border-radius:11px;padding:3px;gap:2px;margin:13px 16px 0;}
.tbtn{flex:1;padding:9px 0;border:none;border-radius:9px;font-size:12px;font-weight:500;color:#7a93a8;background:transparent;cursor:pointer;}
.tbtn.on{background:linear-gradient(135deg,#7c9cbf,#9b87c4);color:#fff;font-weight:700;}
.page{padding:14px 16px 0;display:none;}
.page.on{display:block;}
.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 14px rgba(100,130,160,.08);margin-bottom:13px;}
.lbl{font-size:10px;font-weight:700;color:#a8bfcc;letter-spacing:1.2px;margin-bottom:12px;text-transform:uppercase;}
.inp{padding:10px 12px;border-radius:10px;border:1.5px solid #dce7f0;font-size:14px;outline:none;color:#2d3f52;background:#fafcff;}
.inp:focus{border-color:#7c9cbf;}
.row{display:flex;gap:8px;align-items:center;}
.btn{border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;padding:10px 16px;color:#fff;}
.btn-g{background:linear-gradient(135deg,#7c9cbf,#9b87c4);}
.btn-b{background:#7c9cbf;}
.btn-o{background:#c4826a;}
.goal-card{background:linear-gradient(135deg,#7c9cbf,#9b87c4);color:#fff;border-radius:18px;padding:26px 22px;margin-bottom:13px;}
.prog-bar{background:rgba(255,255,255,.25);border-radius:8px;height:7px;overflow:hidden;margin-top:16px;}
.prog-fill{height:100%;background:#fff;border-radius:8px;}
.cols2{display:flex;gap:12px;margin-bottom:13px;}
.cols2 .card{flex:1;margin-bottom:0;}
.chk-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #dce7f0;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
.chkbox{width:22px;height:22px;border-radius:7px;border:2px solid #dce7f0;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-weight:700;font-size:13px;}
.chkbox.on{background:#7c9cbf;border-color:#7c9cbf;}
.chktxt{font-size:14px;color:#2d3f52;flex:1;}
.chktxt.on{color:#a8bfcc;text-decoration:line-through;}
.wbars{display:flex;gap:5px;}
.wbar{flex:1;text-align:center;}
.wbar-bg{height:46px;border-radius:8px;background:#eef3f8;position:relative;overflow:hidden;border:2px solid transparent;}
.wbar-bg.today{border-color:#7c9cbf;}
.wbar-fill{position:absolute;bottom:0;left:0;right:0;background:#b8d0e8;}
.wbar-fill.full{background:#7c9cbf;}
.rec-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #dce7f0;}
.rm{background:none;border:none;color:#a8bfcc;font-size:18px;padding:0 4px;cursor:pointer;}
.ai-box{background:#f0f5fb;border:1.5px solid #b8d0e8;border-radius:10px;padding:11px 13px;margin-bottom:12px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{border-radius:12px;padding:8px 4px;background:#f8fafc;border:2px solid transparent;min-height:72px;display:flex;flex-direction:column;align-items:center;}
.cal-cell.istoday{border-color:#7c9cbf;background:linear-gradient(135deg,#7c9cbf22,#9b87c422);}
.cal-cell.future{opacity:.38;}
.cal-cell.hasdata{background:#f0f5fb;}
.stats3{display:flex;gap:10px;}
.sbox{flex:1;background:#f0f4f8;border-radius:12px;padding:12px 8px;text-align:center;}
#setup-screen{min-height:100vh;background:#f0f4f8;display:flex;align-items:center;justify-content:center;padding:20px;}
.setup-box{background:#fff;border-radius:24px;padding:40px 28px;width:100%;max-width:400px;box-shadow:0 4px 28px rgba(100,130,160,.12);}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-box">
    <div style="font-size:26px;font-weight:800;color:#2d3f52;margin-bottom:4px">목표 설정</div>
    <div style="font-size:13px;color:#7a93a8;margin-bottom:24px">다이어트 목표와 필수 규칙을 입력해주세요</div>
    <div style="font-size:11px;font-weight:700;color:#7a93a8;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase">몸무게 & 기간</div>
    <div style="font-size:12px;font-weight:600;color:#7a93a8;margin-bottom:5px">시작 몸무게 (kg)</div>
    <input class="inp" id="f-sw" type="number" placeholder="예: 72.0" style="width:100%;margin-bottom:14px"/>
    <div style="font-size:12px;font-weight:600;color:#7a93a8;margin-bottom:5px">목표 몸무게 (kg)</div>
    <input class="inp" id="f-tw" type="number" placeholder="예: 65.0" style="width:100%;margin-bottom:14px"/>
    <div style="font-size:12px;font-weight:600;color:#7a93a8;margin-bottom:5px">시작 날짜</div>
    <input class="inp" id="f-sd" type="date" style="width:100%;margin-bottom:14px"/>
    <div style="font-size:12px;font-weight:600;color:#7a93a8;margin-bottom:5px">목표 날짜</div>
    <input class="inp" id="f-ed" type="date" style="width:100%;margin-bottom:20px"/>
    <div style="font-size:11px;font-weight:700;color:#7a93a8;letter-spacing:1px;margin-bottom:14px;text-transform:uppercase">꼭 지켜야 할 규칙 3가지</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#7c9cbf,#9b87c4);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">1</div>
      <input class="inp" id="f-r1" value="주 3회 이상 운동하기" style="flex:1"/>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#7c9cbf,#9b87c4);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">2</div>
      <input class="inp" id="f-r2" value="클린 식단 유지하기" style="flex:1"/>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#7c9cbf,#9b87c4);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">3</div>
      <input class="inp" id="f-r3" value="밤 10시 이후 금식하기" style="flex:1"/>
    </div>
    <button class="btn btn-g" style="width:100%;padding:14px;font-size:15px" onclick="startApp()">시작하기 →</button>
  </div>
</div>

<div id="app-screen" class="hide">
  <div id="header">
    <div><h1>다이어트 트래커</h1><p id="hdr-date"></p></div>
    <div style="font-size:10px;color:#a8bfcc">💾 자동저장</div>
  </div>
  <div id="tabbar">
    <button class="tbtn on" onclick="goTab(0)">홈</button>
    <button class="tbtn" onclick="goTab(1)">체크리스트</button>
    <button class="tbtn" onclick="goTab(2)">기록</button>
    <button class="tbtn" onclick="goTab(3)">리포트</button>
  </div>

  <!-- 홈 -->
  <div class="page on" id="p0">
    <div class="goal-card" id="goal-card"></div>
    <div class="cols2">
      <div class="card"><div class="lbl">오늘 몸무게</div><div style="font-size:24px;font-weight:800;color:#2d3f52;font-family:monospace" id="h-w">—<span style="font-size:13px;font-weight:500;color:#7a93a8"> kg</span></div><div id="h-wdiff" style="font-size:12px;margin-top:3px;font-weight:600"></div></div>
      <div class="card"><div class="lbl">오늘 칼로리</div><div style="font-size:24px;font-weight:800;color:#2d3f52;font-family:monospace" id="h-cal">0<span style="font-size:13px;font-weight:500;color:#7a93a8"> kcal</span></div><div id="h-burn" style="font-size:12px;color:#6baa9f;margin-top:3px;font-weight:600"></div></div>
    </div>
    <div class="card">
      <div class="lbl">오늘 체크리스트</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="position:relative;width:86px;height:86px;flex-shrink:0">
          <svg width="86" height="86" style="transform:rotate(-90deg)"><circle cx="43" cy="43" r="36" fill="none" stroke="#dce7f0" stroke-width="7"/><circle id="cc" cx="43" cy="43" r="36" fill="none" stroke="#7c9cbf" stroke-width="7" stroke-linecap="round" stroke-dasharray="0 226"/></svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:17px;font-weight:700;color:#2d3f52;font-family:monospace" id="cpct">0%</span><span style="font-size:10px;color:#7a93a8;margin-top:2px">달성</span></div>
        </div>
        <div><div style="font-size:22px;font-weight:800;color:#2d3f52" id="ccnt">0/0</div><div style="font-size:13px;color:#7a93a8;margin-top:4px">항목 완료</div><div id="call" style="font-size:12px;color:#6baa9f;font-weight:700;margin-top:5px"></div></div>
      </div>
    </div>
    <div class="card hide" id="wchart-card">
      <div class="lbl">몸무게 추이</div>
      <div style="overflow-x:auto"><svg id="wchart" height="110" style="overflow:visible"></svg></div>
    </div>
    <div class="card">
      <div class="lbl">기간 진행</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="position:relative;width:86px;height:86px;flex-shrink:0">
          <svg width="86" height="86" style="transform:rotate(-90deg)"><circle cx="43" cy="43" r="36" fill="none" stroke="#dce7f0" stroke-width="7"/><circle id="dc" cx="43" cy="43" r="36" fill="none" stroke="#9b87c4" stroke-width="7" stroke-linecap="round" stroke-dasharray="0 226"/></svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:17px;font-weight:700;color:#2d3f52;font-family:monospace" id="dpct">0%</span><span style="font-size:10px;color:#7a93a8;margin-top:2px">진행</span></div>
        </div>
        <div><div style="font-size:22px;font-weight:800;color:#2d3f52" id="dcnt">D+0</div><div style="font-size:13px;color:#7a93a8;margin-top:4px" id="dtotal"></div><div style="font-size:12px;color:#9b87c4;font-weight:700;margin-top:5px" id="drem"></div></div>
      </div>
    </div>
  </div>

  <!-- 체크리스트 -->
  <div class="page" id="p1">
    <div class="card">
      <div class="lbl" id="chk-lbl">오늘 체크</div>
      <div id="chk-list"></div>
      <div style="margin-top:12px;text-align:right"><span style="font-size:13px;color:#7c9cbf;font-weight:700" id="chk-done"></span></div>
    </div>
    <div class="card">
      <div class="lbl">이번 주 달성 현황</div>
      <div class="wbars" id="wbars"></div>
    </div>
    <div class="card">
      <div class="lbl">항목 관리</div>
      <div id="item-list"></div>
      <div class="row" style="margin-top:14px">
        <input class="inp" id="new-inp" placeholder="새 항목 추가..."/>
        <button class="btn btn-g" onclick="addItem()" style="padding:10px 16px;font-size:16px">+</button>
      </div>
    </div>
  </div>

  <!-- 기록 -->
  <div class="page" id="p2">
    <div class="card">
      <div class="lbl">몸무게 기록</div>
      <div class="row">
        <input class="inp" id="w-inp" type="number" placeholder="오늘 몸무게 (kg)" style="flex:1"/>
        <button class="btn btn-b" onclick="saveW()">저장</button>
      </div>
    </div>
    <div class="card">
      <div class="lbl">식단 기록 · AI 칼로리 계산</div>
      <div class="row" style="margin-bottom:10px">
        <input class="inp" id="ai-inp" placeholder="음식 이름으로 칼로리 검색..." style="flex:1"/>
        <button class="btn btn-g" id="ai-btn" onclick="doAI()" style="white-space:nowrap;font-size:12px;padding:10px 12px">🤖 AI</button>
      </div>
      <div id="ai-res"></div>
      <div class="row" style="margin-bottom:10px;gap:6px">
        <input class="inp" id="mn" placeholder="음식 이름" style="flex:2"/>
        <input class="inp" id="mc" type="number" placeholder="kcal" style="flex:1"/>
        <button class="btn btn-g" onclick="addMeal()" style="padding:10px 13px;font-size:16px">+</button>
      </div>
      <div id="meal-list"></div>
      <div id="meal-total" style="text-align:right;margin-top:10px;font-size:14px;font-weight:800;color:#9b87c4"></div>
    </div>
    <div class="card">
      <div class="lbl">운동 기록</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
        <input class="inp" id="en" placeholder="운동 이름" style="flex:2 1 90px"/>
        <input class="inp" id="em" type="number" placeholder="분" style="flex:1 1 44px"/>
        <input class="inp" id="ec" type="number" placeholder="소모kcal" style="flex:1 1 60px"/>
        <button class="btn btn-o" onclick="addEx()" style="padding:10px 14px;font-size:16px">+</button>
      </div>
      <div id="ex-list"></div>
      <div id="ex-total" style="text-align:right;margin-top:10px;font-size:14px;font-weight:800;color:#c4826a"></div>
    </div>
  </div>

  <!-- 리포트 -->
  <div class="page" id="p3">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button class="btn" style="background:#eef3f8;color:#7a93a8;width:32px;height:32px;padding:0;font-size:18px;border-radius:8px" onclick="chgWeek(-1)">‹</button>
        <div style="text-align:center"><div style="font-size:13px;font-weight:700;color:#2d3f52" id="rep-lbl"></div><div id="rep-this" style="font-size:10px;color:#7c9cbf;font-weight:600;margin-top:2px"></div></div>
        <button class="btn" id="rep-nxt" style="background:#eef3f8;color:#a8bfcc;width:32px;height:32px;padding:0;font-size:18px;border-radius:8px" onclick="chgWeek(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-hdr" style="margin-bottom:6px"></div>
      <div class="cal-grid" id="cal-grid"></div>
      <div style="display:flex;gap:12px;margin-top:14px;justify-content:center;font-size:11px;color:#7a93a8">
        <span>⚖️ 몸무게</span><span>🍽 식단</span><span>💪 운동</span>
      </div>
    </div>
    <div class="card"><div class="lbl">주간 기록 요약</div><div id="rep-sum"></div></div>
    <div class="card"><div class="lbl">전체 기록 통계</div><div class="stats3" id="stats"></div></div>
    <button class="btn" style="width:100%;padding:13px;background:#eef3f8;color:#7a93a8;margin-bottom:10px" onclick="resetGoal()">⚙️ 목표 다시 설정</button>
    <button class="btn" style="width:100%;padding:13px;background:#fdf0f2;color:#c4748a;border:1px solid #c4748a30" onclick="resetAll()">🗑 전체 데이터 초기화</button>
  </div>
</div>

<script>
const WD=["월","화","수","목","금","토","일"];
const SAMPLE=[{id:1,text:"물 2L 마시기"},{id:2,text:"야식 금지"},{id:3,text:"저녁 9시 이후 금식"},{id:4,text:"30분 이상 운동"}];
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
let setup=ld("dt_s",null),items=ld("dt_i",SAMPLE),checks=ld("dt_c",{}),records=ld("dt_r",{}),weekOff=0,curTab=0;
function td(){return new Date().toISOString().slice(0,10);}
function wk(ref){const d=ref?new Date(ref):new Date(),day=d.getDay(),diff=day===0?-6:1-day;return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+diff+i);return x.toISOString().slice(0,10);});}
function fd(s){const[,m,d]=s.split("-");return`${+m}/${+d}`;}

function startApp(){
  const sw=document.getElementById("f-sw").value,tw=document.getElementById("f-tw").value,sd=document.getElementById("f-sd").value,ed=document.getElementById("f-ed").value;
  if(!sw||!tw||!sd||!ed){alert("모든 항목을 입력해주세요!");return;}
  setup={sw:+sw,tw:+tw,sd,ed,r1:document.getElementById("f-r1").value,r2:document.getElementById("f-r2").value,r3:document.getElementById("f-r3").value};
  sv("dt_s",setup);showApp();
}

function showApp(){
  document.getElementById("setup-screen").classList.add("hide");
  document.getElementById("app-screen").classList.remove("hide");
  document.getElementById("hdr-date").textContent=`${setup.sd} ~ ${setup.ed}`;
  render();
}

function goTab(i){
  curTab=i;
  document.querySelectorAll(".tbtn").forEach((b,j)=>b.classList.toggle("on",i===j));
  document.querySelectorAll(".page").forEach((p,j)=>p.classList.toggle("on",i===j));
  render();
}

function render(){
  rHome();
  if(curTab===1)rChk();
  if(curTab===2)rRec();
  if(curTab===3)rRep();
}

function rHome(){
  const t=td(),rec=records[t]||{},ch=checks[t]||{};
  const tw=setup.tw,sw=setup.sw,todayW=rec.weight||null;
  const lost=todayW?sw-todayW:0,need=sw-tw;
  const wPct=need>0?Math.max(0,Math.min(lost/need,1)):0;
  const calIn=(rec.meals||[]).reduce((s,m)=>s+(m.cal||0),0);
  const calOut=(rec.exercises||[]).reduce((s,e)=>s+(e.cal||0),0);
  const done=items.filter(it=>ch[it.id]).length,chkPct=items.length>0?done/items.length:0;
  const totalD=Math.max(1,Math.ceil((new Date(setup.ed)-new Date(setup.sd))/86400000));
  const passed=Math.max(0,Math.ceil((new Date(t)-new Date(setup.sd))/86400000));
  const dayPct=Math.min(passed/totalD,1);
  const circ=2*Math.PI*36;
  const rules=[setup.r1,setup.r2,setup.r3].filter(Boolean);

  document.getElementById("goal-card").innerHTML=`
    <div style="font-size:11px;font-weight:600;opacity:.8;margin-bottom:4px">목표 몸무게</div>
    <div style="display:flex;align-items:flex-end;gap:6px"><span style="font-size:50px;font-weight:800;line-height:1;font-family:monospace">${tw}</span><span style="font-size:18px;font-weight:600;margin-bottom:5px">kg</span></div>
    <div style="font-size:12px;opacity:.85;margin-top:5px">${sw}kg → ${tw}kg · ${need>0?need.toFixed(1)+"kg 감량":"유지"}</div>
    ${rules.length?`<div style="margin-top:16px;background:rgba(255,255,255,.18);border-radius:12px;padding:12px 14px"><div style="font-size:10px;font-weight:700;opacity:.75;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase">꼭 지켜야 할 것</div>${rules.map((r,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:${i<rules.length-1?6:0}px"><div style="width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.3);font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div><span style="font-size:12px;opacity:.95">${r}</span></div>`).join("")}</div>`:""}
    <div class="prog-bar"><div class="prog-fill" style="width:${wPct*100}%"></div></div>
    <div style="font-size:11px;opacity:.8;margin-top:5px">감량 진행률 ${Math.round(wPct*100)}% · D-${Math.max(0,totalD-passed)}</div>`;

  document.getElementById("h-w").innerHTML=`${todayW||"—"}<span style="font-size:13px;font-weight:500;color:#7a93a8"> kg</span>`;
  const de=document.getElementById("h-wdiff");
  de.textContent=todayW&&lost!==0?(lost>0?`▼ ${lost.toFixed(1)}kg`:`▲ ${Math.abs(lost).toFixed(1)}kg`):"";
  de.style.color=lost>0?"#6baa9f":"#c4748a";
  document.getElementById("h-cal").innerHTML=`${calIn}<span style="font-size:13px;font-weight:500;color:#7a93a8"> kcal</span>`;
  document.getElementById("h-burn").textContent=calOut>0?`🔥 -${calOut} 소모`:"";
  document.getElementById("cc").setAttribute("stroke-dasharray",`${circ*chkPct} ${circ}`);
  document.getElementById("cpct").textContent=Math.round(chkPct*100)+"%";
  document.getElementById("ccnt").textContent=`${done} / ${items.length}`;
  document.getElementById("call").textContent=chkPct===1?"🎉 오늘 모두 달성!":"";
  document.getElementById("dc").setAttribute("stroke-dasharray",`${circ*dayPct} ${circ}`);
  document.getElementById("dpct").textContent=Math.round(dayPct*100)+"%";
  document.getElementById("dcnt").textContent=`D+${passed}`;
  document.getElementById("dtotal").textContent=`전체 ${totalD}일 중`;
  document.getElementById("drem").textContent=`D-${Math.max(0,totalD-passed)} 남음`;

  const allW=Object.entries(records).filter(([,r])=>r.weight).sort(([a],[b])=>a.localeCompare(b)).map(([date,r])=>({date,v:r.weight}));
  const cc=document.getElementById("wchart-card");
  if(allW.length>=2){cc.classList.remove("hide");drawChart(allW,tw);}else cc.classList.add("hide");
}

function drawChart(data,target){
  const W=300,H=110,pL=34,pR=14,pT=14,pB=26;
  const vals=data.map(d=>d.v),minV=Math.min(...vals,target)-.5,maxV=Math.max(...vals)+.5,range=maxV-minV||1;
  const iw=W-pL-pR,ih=H-pT-pB,tx=i=>pL+(i/(data.length-1))*iw,ty=v=>pT+((maxV-v)/range)*ih;
  const pts=data.map((d,i)=>`${tx(i)},${ty(d.v)}`).join(" "),tyy=ty(target);
  const svg=document.getElementById("wchart");
  svg.setAttribute("width",W);
  svg.innerHTML=`<line x1="${pL}" y1="${tyy}" x2="${W-pR}" y2="${tyy}" stroke="#6baa9f" stroke-width="1" stroke-dasharray="4 3" opacity=".6"/>
    <text x="${pL-3}" y="${tyy-4}" font-size="9" fill="#6baa9f" text-anchor="end">목표</text>
    <polyline points="${pts}" fill="none" stroke="#7c9cbf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${data.map((d,i)=>`<circle cx="${tx(i)}" cy="${ty(d.v)}" r="4" fill="#7c9cbf"/><text x="${tx(i)}" y="${ty(d.v)-7}" font-size="10" fill="#7c9cbf" text-anchor="middle" font-weight="700">${d.v}</text>`).join("")}
    ${data.filter((_,i)=>i%Math.ceil(data.length/5)===0).map((d)=>`<text x="${tx(data.indexOf(d))}" y="${H-2}" font-size="9" fill="#a8bfcc" text-anchor="middle">${fd(d.date)}</text>`).join("")}`;
}

function rChk(){
  const t=td(),ch=checks[t]||{};
  document.getElementById("chk-lbl").textContent=`오늘 체크 — ${t}`;
  const done=items.filter(it=>ch[it.id]).length;
  document.getElementById("chk-list").innerHTML=items.length===0?`<div style="text-align:center;padding:20px 0;color:#a8bfcc;font-size:14px">아래에서 항목을 추가해 주세요</div>`:
    items.map(it=>`<div class="chk-row" onclick="tglChk(${it.id})"><div class="chkbox ${ch[it.id]?"on":""}">${ch[it.id]?"✓":""}</div><span class="chktxt ${ch[it.id]?"on":""}">${it.text}</span></div>`).join("");
  document.getElementById("chk-done").textContent=items.length?`${done}/${items.length} 완료`:"";
  const wd=wk(t);
  document.getElementById("wbars").innerHTML=wd.map((d,i)=>{
    const dc=checks[d]||{},pct=items.length>0?items.filter(it=>dc[it.id]).length/items.length:0,isT=d===t;
    return`<div class="wbar"><div style="font-size:10px;color:#7a93a8;margin-bottom:5px">${WD[i]}</div><div class="wbar-bg ${isT?"today":""}"><div class="wbar-fill ${pct===1?"full":""}" style="height:${pct*100}%"></div></div><div style="font-size:9px;color:#7a93a8;margin-top:3px">${Math.round(pct*100)}%</div></div>`;}).join("");
  document.getElementById("item-list").innerHTML=items.map(it=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #dce7f0"><div style="width:18px;height:18px;border-radius:5px;border:2px solid #dce7f0;background:#f8fafc;flex-shrink:0"></div><span style="flex:1;font-size:14px;color:#2d3f52">${it.text}</span><button class="rm" onclick="rmItem(${it.id})">×</button></div>`).join("");
}

function rRec(){
  const t=td(),rec=records[t]||{},meals=rec.meals||[],exs=rec.exercises||[];
  document.getElementById("w-inp").placeholder=rec.weight?`현재: ${rec.weight}kg`:"오늘 몸무게 (kg)";
  const ct=meals.reduce((s,m)=>s+(m.cal||0),0);
  document.getElementById("meal-list").innerHTML=meals.map((m,i)=>`<div class="rec-row"><span style="font-size:14px;color:#2d3f52">${m.name}</span><div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;font-weight:700;color:#9b87c4;font-family:monospace">${m.cal} kcal</span><button class="rm" onclick="rmMeal(${i})">×</button></div></div>`).join("");
  document.getElementById("meal-total").textContent=meals.length?`합계: ${ct} kcal`:"";
  const bt=exs.reduce((s,e)=>s+(e.cal||0),0);
  document.getElementById("ex-list").innerHTML=exs.map((e,i)=>`<div class="rec-row"><span style="font-size:14px;color:#2d3f52">🏃 ${e.name}${e.min?` (${e.min}분)`:""}</span><div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;font-weight:700;color:#c4826a;font-family:monospace">-${e.cal} kcal</span><button class="rm" onclick="rmEx(${i})">×</button></div></div>`).join("");
  document.getElementById("ex-total").textContent=exs.length?`총 소모: ${bt} kcal`:"";
}

function rRep(){
  const t=td(),ref=new Date(t);
  ref.setDate(ref.getDate()+weekOff*7);
  const wd=wk(ref.toISOString().slice(0,10));
  document.getElementById("rep-lbl").textContent=`${fd(wd[0])} ~ ${fd(wd[6])}`;
  document.getElementById("rep-this").textContent=weekOff===0?"이번 주":"";
  document.getElementById("rep-nxt").style.color=weekOff===0?"#a8bfcc":"#7a93a8";
  document.getElementById("cal-hdr").innerHTML=WD.map(d=>`<div style="text-align:center;font-size:10px;color:#a8bfcc;font-weight:600;padding:4px 0">${d}</div>`).join("");
  document.getElementById("cal-grid").innerHTML=wd.map((d,i)=>{
    const rec=records[d]||{},ch=checks[d]||{};
    const done=items.filter(it=>ch[it.id]).length,pct=items.length>0?done/items.length:0;
    const hasW=!!rec.weight,hasM=(rec.meals||[]).length>0,hasE=(rec.exercises||[]).length>0;
    const isT=d===t,isFut=d>t,dn=+d.slice(8);
    const cls=`cal-cell${isT?" istoday":""}${isFut?" future":""}${!isFut&&(hasW||hasM||hasE||done>0)?" hasdata":""}`;
    return`<div class="${cls}">
      <div style="font-size:13px;font-weight:${isT?800:600};color:${isT?"#7c9cbf":"#2d3f52"};margin-bottom:5px">${dn}</div>
      ${!isFut?`<div style="width:80%;height:3px;border-radius:4px;background:#e8eef4;margin-bottom:5px;overflow:hidden"><div style="height:100%;width:${pct*100}%;background:${pct===1?"#6baa9f":"#7c9cbf"};border-radius:4px"></div></div>`:""}
      ${!isFut?`<div style="display:flex;gap:1px;flex-wrap:wrap;justify-content:center;font-size:10px">${hasW?"⚖️":""}${hasM?"🍽":""}${hasE?"💪":""}</div>`:""}
      ${hasW?`<div style="font-size:9px;color:#5a7a9e;font-weight:700;margin-top:3px;font-family:monospace">${rec.weight}</div>`:""}
    </div>`;}).join("");
  const rows=wd.map((d,i)=>{
    const rec=records[d]||{},ch=checks[d]||{};
    const done=items.filter(it=>ch[it.id]).length,meals=rec.meals||[],exs=rec.exercises||[];
    const ct=meals.reduce((s,m)=>s+(m.cal||0),0);
    if((!rec.weight&&!meals.length&&!exs.length&&!done)||d>t)return"";
    return`<div style="padding:12px 0;border-bottom:1px solid #dce7f0">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#7c9cbf28,#9b87c428);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#7c9cbf">${WD[i]}</div>
        <div style="font-size:13px;font-weight:700;color:#2d3f52">${fd(d)}</div>
        ${rec.weight?`<div style="font-size:12px;color:#7a93a8;margin-left:auto;font-family:monospace">${rec.weight}kg</div>`:""}
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        ${done?`<span style="font-size:11px;background:#7c9cbf18;color:#5a7a9e;border-radius:6px;padding:3px 8px;font-weight:600">✓ ${done}/${items.length}</span>`:""}
        ${ct?`<span style="font-size:11px;background:#9b87c418;color:#9b87c4;border-radius:6px;padding:3px 8px;font-weight:600">🍽 ${ct}kcal</span>`:""}
        ${exs.length?`<span style="font-size:11px;background:#c4826a18;color:#c4826a;border-radius:6px;padding:3px 8px;font-weight:600">💪 ${exs.length}회</span>`:""}
      </div>
    </div>`;}).join("");
  document.getElementById("rep-sum").innerHTML=rows||`<div style="text-align:center;padding:20px 0;color:#a8bfcc;font-size:14px">이 주의 기록이 없어요</div>`;
  const allW=Object.entries(records).filter(([,r])=>r.weight).map(([,r])=>r.weight);
  const t0=records[t]||{},lost=t0.weight?setup.sw-t0.weight:0;
  document.getElementById("stats").innerHTML=`
    <div class="sbox"><div style="font-size:17px;font-weight:800;color:#9b87c4;font-family:monospace">${Object.keys(records).length}일</div><div style="font-size:11px;color:#7a93a8;margin-top:4px">기록일</div></div>
    <div class="sbox"><div style="font-size:17px;font-weight:800;color:#6baa9f;font-family:monospace">${allW.length?Math.min(...allW)+"kg":"—"}</div><div style="font-size:11px;color:#7a93a8;margin-top:4px">최저 몸무게</div></div>
    <div class="sbox"><div style="font-size:17px;font-weight:800;color:#7c9cbf;font-family:monospace">${lost>0?lost.toFixed(1)+"kg":"—"}</div><div style="font-size:11px;color:#7a93a8;margin-top:4px">총 감량</div></div>`;
}

function tglChk(id){const t=td();if(!checks[t])checks[t]={};checks[t][id]=!checks[t][id];sv("dt_c",checks);rChk();rHome();}
function addItem(){const inp=document.getElementById("new-inp"),txt=inp.value.trim();if(!txt)return;items.push({id:Date.now(),text:txt});sv("dt_i",items);inp.value="";rChk();}
function rmItem(id){items=items.filter(it=>it.id!==id);sv("dt_i",items);rChk();}
function saveW(){const v=document.getElementById("w-inp").value;if(!v)return;const t=td();if(!records[t])records[t]={};records[t].weight=+v;sv("dt_r",records);document.getElementById("w-inp").value="";rRec();rHome();}
async function doAI(){
  const inp=document.getElementById("ai-inp"),meal=inp.value.trim();if(!meal)return;
  const btn=document.getElementById("ai-btn");btn.textContent="⏳";btn.disabled=true;
  document.getElementById("ai-res").innerHTML="";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,
        system:`음식 칼로리 전문가. JSON만 응답: {"name":"음식명","cal":숫자,"unit":"단위","note":"설명"}`,
        messages:[{role:"user",content:meal}]})});
    const data=await res.json(),txt=data.content?.map(c=>c.text||"").join("")||"";
    const r=JSON.parse(txt.replace(/```json|```/g,"").trim());
    document.getElementById("ai-res").innerHTML=`<div class="ai-box"><div style="font-size:14px;font-weight:700;color:#5a7a9e">${r.name} — ${r.cal} kcal <span style="font-size:11px;font-weight:400;color:#7a93a8">/ ${r.unit}</span></div>${r.note?`<div style="font-size:12px;color:#7a93a8;margin-top:3px">${r.note}</div>`:""}<button class="btn btn-b" style="margin-top:10px;padding:7px 15px;font-size:13px" onclick="addMealD('${r.name.replace(/'/g,"\\'")}',${r.cal})">+ 식단에 추가</button></div>`;
  }catch{document.getElementById("ai-res").innerHTML=`<div style="color:#c4748a;font-size:13px;margin-bottom:10px">검색 실패. 직접 입력해 주세요.</div>`;}
  btn.textContent="🤖 AI";btn.disabled=false;
}
function addMealD(name,cal){const t=td();if(!records[t])records[t]={};if(!records[t].meals)records[t].meals=[];records[t].meals.push({name,cal});sv("dt_r",records);document.getElementById("ai-res").innerHTML="";document.getElementById("ai-inp").value="";rRec();rHome();}
function addMeal(){const name=document.getElementById("mn").value.trim(),cal=+document.getElementById("mc").value;if(!name||!cal)return;const t=td();if(!records[t])records[t]={};if(!records[t].meals)records[t].meals=[];records[t].meals.push({name,cal});sv("dt_r",records);document.getElementById("mn").value="";document.getElementById("mc").value="";rRec();rHome();}
function rmMeal(i){const t=td();records[t].meals.splice(i,1);sv("dt_r",records);rRec();rHome();}
function addEx(){const name=document.getElementById("en").value.trim();if(!name)return;const min=+document.getElementById("em").value||0,cal=+document.getElementById("ec").value||0,t=td();if(!records[t])records[t]={};if(!records[t].exercises)records[t].exercises=[];records[t].exercises.push({name,min,cal});sv("dt_r",records);document.getElementById("en").value="";document.getElementById("em").value="";document.getElementById("ec").value="";rRec();rHome();}
function rmEx(i){const t=td();records[t].exercises.splice(i,1);sv("dt_r",records);rRec();rHome();}
function chgWeek(d){if(d===1&&weekOff===0)return;weekOff+=d;rRep();}
function resetGoal(){if(confirm("목표를 다시 설정할까요? 기록 데이터는 유지됩니다.")){setup=null;sv("dt_s",null);document.getElementById("app-screen").classList.add("hide");document.getElementById("setup-screen").classList.remove("hide");}}
function resetAll(){if(confirm("⚠️ 모든 데이터가 삭제됩니다. 정말 초기화할까요?")){localStorage.clear();location.reload();}}

// 한글 입력 버그 방지
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("new-inp").addEventListener("keyup",e=>{if(e.key==="Enter")addItem();});
  document.getElementById("ai-inp").addEventListener("keyup",e=>{if(e.key==="Enter")doAI();});
  document.getElementById("w-inp").addEventListener("keyup",e=>{if(e.key==="Enter")saveW();});
  if(setup)showApp();
});
</script>
</body>
